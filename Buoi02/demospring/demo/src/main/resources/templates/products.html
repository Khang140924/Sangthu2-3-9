<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Danh sách sản phẩm</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h2>Danh sách sản phẩm</h2>
      <a href="/products/add" class="btn btn-primary mb-3">Thêm sản phẩm mới</a>
      <table class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Danh mục</th>
            <th>Hình ảnh</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="product : ${products}">
            <td th:text="${product.id}">1</td>
            <td th:text="${product.name}">Tên</td>
            <td th:text="${product.price}">Giá</td>
            <td th:text="${product.category}">Danh mục</td>
            <td>
              <img
                th:if="${product.imageName != null and product.imageName != ''}"
                th:src="@{/uploads/{filename}(filename=${product.imageName})}"
                width="100"
              />
              <span
                th:unless="${product.imageName != null and product.imageName != ''}"
                >Không có hình</span
              >
            </td>
            <td>
              <a
                th:href="@{/products/edit/{id}(id=${product.id})}"
                class="btn btn-warning btn-sm"
                >Sửa</a
              >
              <a
                th:href="@{/products/delete/{id}(id=${product.id})}"
                class="btn btn-danger btn-sm"
                onclick="return confirm('Bạn có chắc chắn muốn xóa?');"
                >Xóa</a
              >
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
