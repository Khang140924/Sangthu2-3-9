<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}">

<head>
  <title>Giỏ hàng của bạn</title>
</head>

<body>
  <div layout:fragment="content">
      <div class="d-flex align-items-center mb-4">
          <h2 class="mb-0 text-primary fw-bold"><i class="bi bi-cart3"></i> Giỏ hàng của bạn</h2>
      </div>
      
      <div th:if="${totalAmount == 0}" class="alert alert-warning mt-3">
          Giỏ hàng của bạn đang trống! <a href="/products" class="alert-link">Tiếp tục mua sắm</a>
      </div>

      <div th:if="${totalAmount > 0}" class="card shadow-sm border-0 mt-4">
          <div class="card-body p-0 table-responsive">
              <table class="table table-hover mb-0">
                  <thead class="table-light text-muted small">
                      <tr>
                          <th class="ps-4">ID</th>
                          <th>Tên sản phẩm</th>
                          <th class="text-center">Đơn giá</th>
                          <th style="width: 20%" class="text-center">Số lượng</th>
                          <th class="text-end">Thành tiền</th>
                          <th class="text-center pe-4">Thao tác</th>
                      </tr>
                  </thead>
                  <tbody>
                  <tr th:each="item : ${cartItems}">
                      <td class="align-middle fw-bold text-secondary ps-4" th:text="${item.productId}"></td>
                      <td class="align-middle fw-semibold" th:text="${item.name}"></td>
                      <td class="align-middle text-center text-muted" th:text="${item.price} + ' ₫'"></td>
                      <td class="align-middle">
                          <form th:action="@{/cart/update}" method="post" class="d-flex justify-content-center">
                              <input type="hidden" name="id" th:value="${item.productId}" />
                              <input type="number" name="qty" th:value="${item.quantity}" min="1" class="form-control form-control-sm text-center mx-1" style="width: 70px;" />
                              <button type="submit" class="btn btn-outline-primary btn-sm rounded-pill px-3"><i class="bi bi-arrow-repeat"></i> Update</button>
                          </form>
                      </td>
                      <td class="align-middle text-end fw-bold text-danger" th:text="${item.price * item.quantity} + ' ₫'"></td>
                      <td class="align-middle text-center pe-4">
                          <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn btn-outline-danger btn-sm rounded-circle shadow-sm" style="width: 32px; height: 32px; padding: 0; line-height: 30px;"><i class="bi bi-trash"></i></a>
                      </td>
                  </tr>
              </tbody>
              <tfoot class="border-top">
                  <tr>
                      <th colspan="4" class="text-end border-0 pt-3 fs-5">Cần thanh toán:</th>
                      <th colspan="2" class="border-0 text-end pe-4 pt-3 fs-4 text-danger fw-bold" th:text="${totalAmount} + ' ₫'"></th>
                  </tr>
              </tfoot>
          </table>
          </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-4 mb-5">
              <a href="/cart/clear" class="btn btn-light text-danger fw-semibold border shadow-sm px-4 rounded-pill"><i class="bi bi-trash3 me-1"></i> Làm rỗng giỏ</a>
              <a href="/cart/checkout" class="btn btn-gradient btn-lg shadow rounded-pill px-5 fw-bold">Thanh Toán <i class="bi bi-arrow-right ms-2"></i></a>
          </div>
      </div>
  </div>
</body>

</html>
