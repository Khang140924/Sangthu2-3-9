<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}">
<head>
  <title>Lịch sử đơn hàng</title>
</head>
<body>
  <div layout:fragment="content">
      <h2 class="mb-4 text-primary fw-bold"><i class="bi bi-clock-history"></i> Lịch sử Mua hàng</h2>
      
      <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info shadow-sm">
          <i class="bi bi-info-circle me-2"></i>Bạn chưa có đơn hàng nào. <a href="/products" class="alert-link">Bắt đầu mua sắm!</a>
      </div>

      <div class="card shadow-sm border-0" th:unless="${#lists.isEmpty(orders)}">
          <div class="card-body p-0 table-responsive">
              <table class="table table-hover mb-0">
                  <thead class="table-light">
                      <tr>
                          <th class="ps-4">Mã đơn #</th>
                          <th>Ngày đặt</th>
                          <th>Người nhận</th>
                          <th>Số điện thoại</th>
                          <th>Tổng hóa đơn</th>
                          <th class="text-center">Chi tiết</th>
                      </tr>
                  </thead>
                  <tbody>
                      <tr th:each="order : ${orders}" class="align-middle">
                          <td class="ps-4 fw-bold text-secondary" th:text="${order.id}"></td>
                          <td th:text="${#dates.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                          <td th:text="${order.customerName}"></td>
                          <td th:text="${order.phone}"></td>
                          <td class="text-danger fw-bold" th:text="${order.totalAmount} + ' ₫'"></td>
                          <td class="text-center">
                              <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                  <i class="bi bi-eye"></i> Xem
                              </a>
                          </td>
                      </tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>
</body>
</html>
