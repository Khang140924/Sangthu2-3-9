<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sửa sách</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Sửa sách</h1>

        <form th:action="@{/books/edit}" th:object="${book}" method="post" class="space-y-4">
            <input type="hidden" th:field="*{id}" />

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Tiêu đề:</label>
                <input type="text" th:field="*{title}" required
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" />
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Tác giả:</label>
                <input type="text" th:field="*{author}" required
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" />
            </div>

            <div class="flex items-center justify-between">
                <button type="submit"
                    class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                    Cập nhật
                </button>
                <a th:href="@{/books}"
                    class="inline-block align-baseline font-bold text-sm text-blue-500 hover:text-blue-800">
                    Hủy bỏ
                </a>
            </div>
        </form>
    </div>
</body>

</html>
