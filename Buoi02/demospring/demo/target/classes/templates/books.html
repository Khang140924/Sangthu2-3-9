<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách sách</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-3xl font-bold mb-6 text-center text-blue-600">Danh sách sách</h1>

        <div class="mb-4">
            <a th:href="@{/books/add}" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
                + Thêm sách mới
            </a>
        </div>

        <table class="min-w-full bg-white border border-gray-300">
            <thead>
                <tr class="bg-gray-200 text-gray-700 uppercase text-sm leading-normal">
                    <th class="py-3 px-6 text-left">ID</th>
                    <th class="py-3 px-6 text-left">Tiêu đề</th>
                    <th class="py-3 px-6 text-left">Tác giả</th>
                    <th class="py-3 px-6 text-center">Hành động</th>
                </tr>
            </thead>
            <tbody class="text-gray-600 text-sm font-light">
                <tr th:each="book : ${books}" class="border-b border-gray-200 hover:bg-gray-100">
                    <td class="py-3 px-6 text-left whitespace-nowrap" th:text="${book.id}">1</td>
                    <td class="py-3 px-6 text-left" th:text="${book.title}">Tên sách</td>
                    <td class="py-3 px-6 text-left" th:text="${book.author}">Tác giả</td>
                    <td class="py-3 px-6 text-center">
                        <a th:href="@{/books/edit/{id}(id=${book.id})}"
                            class="text-blue-500 hover:text-blue-700 mr-2">Sửa</a>
                        <a th:href="@{/books/delete/{id}(id=${book.id})}"
                            onclick="return confirm('Bạn có chắc chắn muốn xóa?');"
                            class="text-red-500 hover:text-red-700">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
