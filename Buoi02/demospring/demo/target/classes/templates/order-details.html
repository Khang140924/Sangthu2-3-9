<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}">
<head>
  <title>Chi tiết Đơn hàng</title>
</head>
<body>
  <div layout:fragment="content">
      <div class="d-flex align-items-center mb-4">
          <a href="/orders" class="btn btn-outline-secondary rounded-circle me-3"><i class="bi bi-arrow-left"></i></a>
          <h2 class="mb-0 text-primary fw-bold">Chi tiết Đơn hàng #[[${order.id}]]</h2>
      </div>

      <div class="row g-4">
          <!-- Order Info -->
          <div class="col-lg-4">
              <div class="card shadow-sm border-0 h-100 rounded-4">
                  <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                      <h5 class="fw-bold"><i class="bi bi-person-lines-fill text-muted me-2"></i>Thông tin Giao hàng</h5>
                  </div>
                  <div class="card-body">
                      <p class="mb-2"><span class="text-muted">Người nhận:</span> <strong th:text="${order.customerName}"></strong></p>
                      <p class="mb-2"><span class="text-muted">Điện thoại:</span> <strong th:text="${order.phone}"></strong></p>
                      <p class="mb-2 d-flex"><span class="text-muted me-2 text-nowrap">Địa chỉ:</span> <span class="text-break" th:text="${order.address}"></span></p>
                      <hr>
                      <p class="mb-2"><span class="text-muted">Ngày đặt:</span> <span th:text="${#dates.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span></p>
                      <p class="mb-0"><span class="text-muted text-nowrap">Trạng thái:</span> <span class="badge bg-success rounded-pill ms-2">Thành công</span></p>
                  </div>
              </div>
          </div>

          <!-- Items Info -->
          <div class="col-lg-8">
              <div class="card shadow-sm border-0 h-100 rounded-4">
                  <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                      <h5 class="fw-bold"><i class="bi bi-box-seam text-muted me-2"></i>Danh sách Sản phẩm</h5>
                  </div>
                  <div class="card-body p-0 mt-3 table-responsive">
                      <table class="table table-borderless table-striped mb-0">
                          <thead class="bg-light text-muted small">
                              <tr>
                                  <th class="ps-4">Sản phẩm</th>
                                  <th class="text-center">Đơn giá</th>
                                  <th class="text-center">SL</th>
                                  <th class="text-end pe-4">Thành tiền</th>
                              </tr>
                          </thead>
                          <tbody>
                              <tr th:each="detail : ${order.orderDetails}" class="align-middle">
                                  <td class="ps-4">
                                      <div class="d-flex align-items-center">
                                          <div th:if="${detail.product.image != null and detail.product.image.startsWith('http')}" class="bg-white border rounded me-3 d-flex align-items-center justify-content-center p-1" style="width: 50px; height: 50px;">
                                              <img th:src="${detail.product.image}" class="img-fluid" style="max-height: 40px;" />
                                          </div>
                                          <div th:unless="${detail.product.image != null and detail.product.image.startsWith('http')}" class="bg-white border rounded me-3 d-flex align-items-center justify-content-center p-1" style="width: 50px; height: 50px;">
                                              <i class="bi bi-image text-muted fs-4"></i>
                                          </div>
                                          <div>
                                              <p class="mb-0 fw-bold px-1" th:text="${detail.product.name}"></p>
                                          </div>
                                      </div>
                                  </td>
                                  <td class="text-center text-secondary" th:text="${detail.unitPrice} + ' ₫'"></td>
                                  <td class="text-center fw-semibold"><span class="badge bg-secondary rounded-pill">x [[${detail.quantity}]]</span></td>
                                  <td class="text-end pe-4 text-danger fw-bold" th:text="${detail.unitPrice * detail.quantity} + ' ₫'"></td>
                              </tr>
                          </tbody>
                          <tfoot class="border-top">
                              <tr>
                                  <th colspan="3" class="text-end pt-3 fs-5">Tổng thanh toán:</th>
                                  <th class="text-end pe-4 pt-3 fs-4 text-danger fw-bold" th:text="${order.totalAmount} + ' ₫'"></th>
                              </tr>
                          </tfoot>
                      </table>
                  </div>
              </div>
          </div>
      </div>
  </div>
</body>
</html>
