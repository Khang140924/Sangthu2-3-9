<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}">
<head>
  <title>Thanh toán đơn hàng</title>
</head>
<body>
  <div layout:fragment="content">
      <h2 class="mb-4 text-primary fw-bold"><i class="bi bi-credit-card"></i> Hoàn tất Đơn hàng</h2>

      <div class="row mt-4 g-4">
          <div class="col-lg-7">
              <div class="card shadow-sm border-0 rounded-4">
                  <div class="card-body p-4">
                      <h5 class="mb-4 fw-bold text-secondary">Thông tin giao hàng</h5>
                      <form th:action="@{/cart/checkout}" method="post" th:object="${order}">
                          <div class="mb-3">
                              <label class="form-label text-muted small fw-bold">Họ và tên</label>
                              <div class="input-group">
                                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                  <input type="text" class="form-control border-start-0 bg-light" th:field="*{customerName}" placeholder="Nhập tên người nhận..." required />
                              </div>
                          </div>
                          <div class="mb-3">
                              <label class="form-label text-muted small fw-bold">Số điện thoại liên hệ</label>
                              <div class="input-group">
                                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone text-muted"></i></span>
                                  <input type="text" class="form-control border-start-0 bg-light" th:field="*{phone}" placeholder="Nhập SĐT..." required />
                              </div>
                          </div>
                          <div class="mb-4">
                              <label class="form-label text-muted small fw-bold">Địa chỉ nhận hàng</label>
                              <div class="input-group">
                                  <span class="input-group-text bg-light border-end-0 align-items-start pt-2"><i class="bi bi-geo-alt text-muted"></i></span>
                                  <textarea class="form-control border-start-0 bg-light" th:field="*{address}" rows="3" placeholder="Ghi rõ số nhà, tên đường..." required></textarea>
                              </div>
                          </div>
                          
                          <button type="submit" class="btn btn-gradient btn-lg w-100 rounded-pill shadow-sm fw-bold">Xác nhận Đặt hàng <i class="bi bi-check-circle ms-1"></i></button>

                          <a href="/cart" class="btn btn-light w-100 rounded-pill mt-3 shadow-sm border text-secondary fw-semibold"><i class="bi bi-arrow-left me-1"></i> Quay lại giỏ hàng</a>
                      </form>
                  </div>
              </div>
          </div>
          <div class="col-lg-5">
              <div class="card shadow border-0 rounded-4 text-white" style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%) !important;">
                  <div class="card-body p-4 text-center">
                      <i class="bi bi-bag-check" style="font-size: 4rem; opacity: 0.8"></i>
                      <h4 class="card-title mt-3 fw-bold">Tổng thanh toán</h4>
                      <h1 class="display-5 fw-bolder text-warning mt-2 mb-4"><span th:text="${totalAmount} + ' ₫'"></span></h1>
                      <hr class="border-light opacity-25">
                      <p class="text-white-50 small mb-0"><i class="bi bi-shield-check me-1"></i> Thanh toán an toàn. Đơn hàng của bạn sẽ được chuẩn bị ngay sau khi xác nhận.</p>
                  </div>
              </div>
          </div>
      </div>
  </div>
</body>
</html>
