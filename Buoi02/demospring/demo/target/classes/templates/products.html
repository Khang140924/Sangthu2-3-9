<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <title>Sản phẩm</title>
</head>

<body>
  <div layout:fragment="content">
      <div class="d-flex flex-wrap justify-content-between align-items-center bg-white p-3 rounded shadow-sm mb-4 border border-light">
          <!-- Chỉ ADMIN thấy nút Thêm -->
          <div sec:authorize="hasRole('ADMIN')">
              <a href="/products/add" class="btn btn-primary shadow-sm"><i class="bi bi-plus-circle"></i> Thêm Sản Phẩm Mới</a>
          </div>
          
          <!-- Người thường thấy tiêu đề -->
          <div sec:authorize="!hasRole('ADMIN')" class="text-primary fw-bold fs-5">
              <i class="bi bi-compass"></i> Khám phá bộ sưu tập
          </div>

          <!-- Bộ lọc -->
          <form th:action="@{/products}" method="get" class="d-flex mt-3 mt-lg-0 gap-2 flex-wrap">
              <input type="hidden" name="sortField" th:value="${sortField}">
              <input type="hidden" name="sortDir" th:value="${sortDir}">
              <select name="categoryId" class="form-select shadow-sm border-0 bg-light" style="max-width: 200px;">
                  <option value="">-- Tất cả Danh mục --</option>
                  <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${categoryId == cat.id}"></option>
              </select>
              <input type="text" name="keyword" th:value="${keyword}" class="form-control shadow-sm border-0 bg-light" style="max-width:250px;" placeholder="Tìm nhanh sản phẩm...">
              <button type="submit" class="btn btn-dark shadow-sm px-4">Lọc</button>
              <a th:href="@{/products}" class="btn btn-outline-secondary shadow-sm">Xóa</a>
          </form>
      </div>

      <!-- Sorting Controls -->
      <div class="d-flex mb-3 align-items-center text-muted small px-2">
          <span class="me-2 fw-semibold">Sắp xếp:</span>
          <a th:href="@{'/products?pageNo=' + ${currentPage} + '&sortField=name&sortDir=' + ${reverseSortDir} + ${keyword != null ? '&keyword=' + keyword : ''} + ${categoryId != null ? '&categoryId=' + categoryId : ''}}" 
             class="text-decoration-none text-primary me-2 badge bg-white shadow-sm border p-2">
             Tên A-Z <i class="bi bi-sort-alpha-down"></i>
          </a>
          <a th:href="@{'/products?pageNo=' + ${currentPage} + '&sortField=price&sortDir=' + ${reverseSortDir} + ${keyword != null ? '&keyword=' + keyword : ''} + ${categoryId != null ? '&categoryId=' + categoryId : ''}}" 
             class="text-decoration-none text-success me-2 badge bg-white shadow-sm border p-2">
             Giá tiền <i class="bi bi-cash-coin"></i>
          </a>
          <a th:href="@{'/products?pageNo=' + ${currentPage} + '&sortField=category.name&sortDir=' + ${reverseSortDir} + ${keyword != null ? '&keyword=' + keyword : ''} + ${categoryId != null ? '&categoryId=' + categoryId : ''}}" 
             class="text-decoration-none text-dark badge bg-white shadow-sm border p-2">
             Danh mục <i class="bi bi-tags"></i>
          </a>
      </div>

      <!-- Products Grid (Card Layout) -->
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 mb-5">
          <div class="col" th:each="product : ${products}">
              <div class="card h-100 overflow-hidden text-center position-relative">
                  <!-- Category Badge -->
                  <span class="position-absolute top-0 start-0 bg-dark text-white px-2 py-1 small rounded-bottom-end fw-bold shadow-sm" style="z-index:2; opacity:0.9;" 
                        th:text="${product.category != null ? product.category.name : 'Khác'}">Danh mục</span>

                  <!-- Image -->
                  <div class="bg-white p-3 pb-0" style="height: 200px; display:flex; align-items:center; justify-content:center;">
                    <img th:if="${product.image != null and product.image.startsWith('http')}" th:src="${product.image}" class="img-fluid rounded" style="max-height: 180px;"/>
                    <img th:if="${product.image != null and !product.image.startsWith('http')}" th:src="@{/uploads/{filename}(filename=${product.image})}" class="img-fluid rounded" style="max-height: 180px;"/>
                    <div th:unless="${product.image != null and product.image != ''}" class="bg-light rounded w-100 h-100 d-flex align-items-center justify-content-center">
                        <i class="bi bi-image text-muted" style="font-size: 4rem;"></i>
                    </div>
                  </div>
                  
                  <div class="card-body d-flex flex-column bg-white">
                      <h5 class="card-title text-truncate fw-bold text-dark mb-1" th:text="${product.name}">Tên sản phẩm</h5>
                      <span class="text-danger fw-bold fs-5 mb-3 d-block" th:text="${product.price} + ' ₫'">Giá</span>
                      
                      <!-- Buttons -->
                      <div class="mt-auto d-flex flex-column gap-2">
                          <a th:href="@{/cart/add/{id}(id=${product.id})}" class="btn btn-gradient w-100 shadow-sm rounded-pill py-2">
                              <i class="bi bi-cart-plus fw-bold"></i> THÊM VÀO GIỎ
                          </a>
                          
                          <!-- Chức năng Admin quản trị Edit / Delete -->
                          <div sec:authorize="hasRole('ADMIN')" class="w-100 d-flex gap-2 mt-2 border-top pt-2">
                              <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-outline-primary btn-sm flex-fill rounded-pill">
                                  <i class="bi bi-pencil-square"></i> Cập nhật
                              </a>
                              <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-outline-danger btn-sm flex-fill rounded-pill"
                                onclick="return confirm('Hành động xóa không thể khôi phục. Tiếp tục?');">
                                  <i class="bi bi-trash"></i> Xóa
                              </a>
                          </div>
                      </div>
                  </div>
              </div>
          </div>
      </div>

      <!-- Pagination -->
      <div th:if="${totalPages > 1}" class="card card-body border-0 shadow-sm d-flex flex-row justify-content-between align-items-center rounded-pill px-4">
          <div class="text-muted fw-bold"><i class="bi bi-boxes text-primary me-1"></i> Kho: [[${totalItems}]] SP</div>
          <nav>
              <ul class="pagination pagination-sm m-0">
                  <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                      <a class="page-link" th:href="@{'/products?pageNo=' + ${currentPage - 1} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir} + ${keyword != null ? '&keyword=' + keyword : ''} + ${categoryId != null ? '&categoryId=' + categoryId : ''}}">
                         <i class="bi bi-chevron-left"></i>
                      </a>
                  </li>
                  <li class="page-item" th:each="i: ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                      <a class="page-link fw-bold" th:href="@{'/products?pageNo=' + ${i} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir} + ${keyword != null ? '&keyword=' + keyword : ''} + ${categoryId != null ? '&categoryId=' + categoryId : ''}}">[[${i}]]</a>
                  </li>
                  <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                      <a class="page-link" th:href="@{'/products?pageNo=' + ${currentPage + 1} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir} + ${keyword != null ? '&keyword=' + keyword : ''} + ${categoryId != null ? '&categoryId=' + categoryId : ''}}">
                          <i class="bi bi-chevron-right"></i>
                      </a>
                  </li>
              </ul>
          </nav>
      </div>

  </div>
</body>
</html>
