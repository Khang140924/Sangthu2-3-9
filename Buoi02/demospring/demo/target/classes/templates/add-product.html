<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h2>Thêm sản phẩm mới</h2>
        <form th:action="@{/products/add}" th:object="${product}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="name" class="form-label">Tên sản phẩm:</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" />
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label for="price" class="form-label">Giá sản phẩm (từ 1 đến 9999999):</label>
                <input type="number" id="price" th:field="*{price}" class="form-control" min="1" max="9999999" />
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="mb-3">
                <label for="category" class="form-label">Danh mục:</label>
                <select id="category" th:field="*{category.id}" class="form-select">
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="image" class="form-label">Hình ảnh (tối đa 200 kí tự):</label>
                <input type="file" id="image" name="image" accept="image/*" class="form-control" />
                <div class="text-danger" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
            </div>

            <button type="submit" class="btn btn-success">Lưu sản phẩm</button>
            <a href="/products" class="btn btn-secondary">Quay lại</a>
        </form>
    </div>
</body>

</html>
